worker_processes auto;
events { worker_connections 1024; }

http {
    upstream backend {
        server api:8000;
    }

    upstream frontend {
        server frontend:8501;
    }

    # HTTP — redirect all traffic to HTTPS (except ACME challenge for cert renewal)
    server {
        listen 80;
        server_name careerhub.deeason.com.np deeason.com.np;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS — TLS termination, proxy to backend + frontend
    server {
        listen 443 ssl;
        server_name careerhub.deeason.com.np deeason.com.np;

        ssl_certificate     /etc/letsencrypt/live/careerhub.deeason.com.np/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/careerhub.deeason.com.np/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # HSTS — browsers remember HTTPS-only for 1 year
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # API routes
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # API docs
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # Health check
        location /health {
            proxy_pass http://backend/health;
        }

        # Streamlit WebSocket support
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
    }
}
