# Local-dev reverse proxy — plain HTTP on :80, no TLS.
# Mirrors the prod proxy paths (nginx.conf) without its Let's Encrypt cert block,
# which only exists on the deployed host; mounting the prod conf locally makes
# nginx [emerg] on the missing certs and crash-loop. docker-compose.prod.yml
# keeps using nginx.conf.
worker_processes auto;
events { worker_connections 1024; }

http {
    upstream backend {
        server api:8000;
    }

    upstream frontend {
        server frontend:8501;
    }

    server {
        listen 80;
        server_name localhost;

        # API routes
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # API docs
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # Health check
        location /health {
            proxy_pass http://backend/health;
        }

        # Streamlit (WebSocket upgrade)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
    }
}
