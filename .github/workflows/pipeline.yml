name: Pipeline

on:
  push:
    branches: [main, develop, "feat/**", "fix/**", "chore/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements.dev.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.dev.txt

      - name: Lint
        run: ruff check backend/

      - name: Format check
        run: ruff format --check backend/

      - name: Test
        working-directory: backend
        env:
          POSTGRES_SERVER: localhost
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
          POSTGRES_PORT: 5432
          SECRET_KEY: ${{ secrets.CI_SECRET_KEY || 'ci-only-secret-key-not-used-in-production' }}
          TESTING: "true"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: pytest tests/ -v --tb=short

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      PREV_SHA: ${{ github.event.before }}

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login

      - uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/careerhub-backend:latest
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/careerhub-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/careerhub-frontend:latest
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/careerhub-frontend:${{ github.sha }}

      - name: Ensure EC2 is running
        run: |
          STATE=$(aws ec2 describe-instances \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "Reservations[0].Instances[0].State.Name" \
            --region "${{ env.AWS_REGION }}" \
            --output text)

          if [ "$STATE" = "stopped" ] || [ "$STATE" = "stopping" ]; then
            aws ec2 start-instances \
              --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
              --region "${{ env.AWS_REGION }}"
            aws ec2 wait instance-running \
              --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
              --region "${{ env.AWS_REGION }}"
          fi

          # Wait for SSM agent to register (up to 3 min)
          for i in $(seq 1 18); do
            READY=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
              --query "InstanceInformationList[0].PingStatus" \
              --region "${{ env.AWS_REGION }}" \
              --output text 2>/dev/null || echo "None")
            [ "$READY" = "Online" ] && break
            sleep 10
          done

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["sudo su - ubuntu -c \"cd ~/ai-career-hub && git pull origin main && bash infra/scripts/deploy.sh\""]' \
            --timeout-seconds 300 \
            --region "${{ env.AWS_REGION }}" \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region "${{ env.AWS_REGION }}" || true

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "[Status, StandardOutputContent, StandardErrorContent]" \
            --output text


      - name: Health check
        id: health
        run: |
          sleep 20
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            "https://${{ secrets.APP_DOMAIN }}/health" || echo "000")
          echo "HTTP $STATUS"
          [ "$STATUS" = "200" ]

      - name: Rollback on failure
        if: failure() && steps.health.outcome == 'failure'
        run: |
          if [ -z "$PREV_SHA" ] || [ "$PREV_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "No valid previous SHA — cannot roll back automatically."
            exit 1
          fi
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"sudo su - ubuntu -c 'cd ~/ai-career-hub && bash infra/scripts/rollback.sh ${PREV_SHA}'\"]" \
            --timeout-seconds 300 \
            --region "${{ env.AWS_REGION }}" \
            --query "Command.CommandId" \
            --output text)
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region "${{ env.AWS_REGION }}" || true
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "[Status, StandardOutputContent, StandardErrorContent]" \
            --output text
          echo "Rollback to $PREV_SHA complete — verify the site manually."
