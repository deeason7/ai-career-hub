name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  # Redeploy the current main by hand — no empty commit needed.
  workflow_dispatch:

# Queue deploys on main; cancel stale runs on PRs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements.dev.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.dev.txt

      - name: Audit Python dependencies
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt \
            --ignore-vuln CVE-2026-1839 \
            --ignore-vuln CVE-2026-4372 \
            --ignore-vuln PYSEC-2024-278 \
            --ignore-vuln PYSEC-2025-183 \
            --ignore-vuln PYSEC-2024-277 \
            --ignore-vuln PYSEC-2025-211 \
            --ignore-vuln PYSEC-2025-212 \
            --ignore-vuln PYSEC-2025-213 \
            --ignore-vuln PYSEC-2025-214 \
            --ignore-vuln PYSEC-2025-215 \
            --ignore-vuln PYSEC-2025-216 \
            --ignore-vuln PYSEC-2025-217 \
            --ignore-vuln PYSEC-2025-218 \
            --ignore-vuln PYSEC-2025-189 \
            --ignore-vuln PYSEC-2025-190 \
            --ignore-vuln PYSEC-2025-191 \
            --ignore-vuln PYSEC-2025-192 \
            --ignore-vuln PYSEC-2025-193 \
            --ignore-vuln PYSEC-2025-194 \
            --ignore-vuln PYSEC-2025-195 \
            --ignore-vuln PYSEC-2025-196 \
            --ignore-vuln PYSEC-2025-197 \
            --ignore-vuln PYSEC-2025-210 \
            --ignore-vuln PYSEC-2026-139 \
            --ignore-vuln CVE-2026-45829 \
            --ignore-vuln PYSEC-2026-3447 \
            --ignore-vuln PYSEC-2026-2290

      - name: Lint
        run: ruff check backend/ frontend/

      - name: Format check
        run: ruff format --check backend/ frontend/

      - name: Test
        working-directory: backend
        env:
          POSTGRES_SERVER: localhost
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
          POSTGRES_PORT: 5432
          SECRET_KEY: ${{ secrets.CI_SECRET_KEY || 'ci-only-insecure-key-never-used-in-prod' }}
          TESTING: "true"
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: pytest tests/ -v --tb=short

  # AWS target — armed only while the AWS_DEPLOY_ENABLED repo variable is
  # 'true'. Clearing it puts the AWS environment in standby: the workflow,
  # scripts and infra docs all stay in place, and re-arming is a one-variable
  # flip rather than a re-setup.
  deploy:
    name: Deploy (AWS)
    runs-on: ubuntu-latest
    needs: ci
    if: >-
      github.ref == 'refs/heads/main'
      && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && vars.AWS_DEPLOY_ENABLED == 'true'
    environment: production  # OIDC sub: repo:deeason7/ai-career-hub:environment:production

    env:
      PREV_SHA: ${{ github.event.before }}

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v4

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/careerhub-backend:latest
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/careerhub-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/careerhub-frontend:latest
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/careerhub-frontend:${{ github.sha }}

      - name: Ensure EC2 is running
        run: |
          STATE=$(aws ec2 describe-instances \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "Reservations[0].Instances[0].State.Name" \
            --region "${{ env.AWS_REGION }}" \
            --output text)
          echo "EC2 state: $STATE"

          if [ "$STATE" = "stopped" ] || [ "$STATE" = "stopping" ]; then
            aws ec2 start-instances \
              --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
              --region "${{ env.AWS_REGION }}"
            aws ec2 wait instance-running \
              --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
              --region "${{ env.AWS_REGION }}"
          fi

          echo "Waiting for SSM agent..."
          for i in $(seq 1 18); do
            READY=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
              --query "InstanceInformationList[0].PingStatus" \
              --region "${{ env.AWS_REGION }}" \
              --output text 2>/dev/null || echo "None")
            echo "  SSM ping [$i/18]: $READY"
            [ "$READY" = "Online" ] && break
            sleep 10
          done
          [ "$READY" = "Online" ] || { echo "::error::SSM agent did not come online"; exit 1; }

      - name: Ensure RDS is running
        run: |
          STATE=$(aws rds describe-db-instances \
            --db-instance-identifier "${{ vars.RDS_DB_IDENTIFIER }}" \
            --query "DBInstances[0].DBInstanceStatus" \
            --region "${{ env.AWS_REGION }}" \
            --output text)
          echo "RDS state: $STATE"

          if [ "$STATE" = "stopping" ]; then
            aws rds wait db-instance-stopped \
              --db-instance-identifier "${{ vars.RDS_DB_IDENTIFIER }}" \
              --region "${{ env.AWS_REGION }}"
            STATE="stopped"
          fi

          if [ "$STATE" = "stopped" ]; then
            aws rds start-db-instance \
              --db-instance-identifier "${{ vars.RDS_DB_IDENTIFIER }}" \
              --region "${{ env.AWS_REGION }}"
          fi

          if [ "$STATE" != "available" ]; then
            aws rds wait db-instance-available \
              --db-instance-identifier "${{ vars.RDS_DB_IDENTIFIER }}" \
              --region "${{ env.AWS_REGION }}"
          fi
          echo "RDS is available."

      - name: Deploy via SSM
        id: ssm-deploy
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["sudo su - ubuntu -c \"cd ~/ai-career-hub && git fetch origin main && git reset --hard origin/main && bash infra/scripts/deploy.sh\""]' \
            --timeout-seconds 600 \
            --region "${{ env.AWS_REGION }}" \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --region "${{ env.AWS_REGION }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i/30] SSM: $STATUS"
            [ "$STATUS" = "Success" ] && break
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "::error::Deploy script $STATUS on EC2 — output below:"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --region "${{ env.AWS_REGION }}" \
                --query "[StandardOutputContent, StandardErrorContent]" \
                --output text
              exit 1
            fi
            sleep 20
          done

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "[Status, StandardOutputContent, StandardErrorContent]" \
            --output text

      - name: Health check
        id: health
        run: |
          EC2_IP=$(aws ec2 describe-instances \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --region "${{ env.AWS_REGION }}" --output text)
          echo "Checking health directly on EC2 ($EC2_IP) — bypasses Route 53 failover..."
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://$EC2_IP/health" 2>/dev/null)
            echo "[$i/20] Health check: HTTP $STATUS"
            [ "$STATUS" = "200" ] && { echo "Deployment verified."; exit 0; }
            sleep 15
          done
          echo "::error::Health check timed out after 5 minutes (last status: HTTP $STATUS)"
          exit 1

      - name: Rollback on health check failure
        if: failure() && steps.ssm-deploy.outcome == 'success' && steps.health.outcome == 'failure'
        run: |
          if [ -z "$PREV_SHA" ] || [ "$PREV_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "::warning::No previous SHA — skipping automatic rollback."
            exit 0
          fi
          echo "Rolling back to $PREV_SHA..."
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"sudo su - ubuntu -c 'cd ~/ai-career-hub && bash infra/scripts/rollback.sh ${PREV_SHA}'\"]" \
            --timeout-seconds 300 \
            --region "${{ env.AWS_REGION }}" \
            --query "Command.CommandId" \
            --output text)
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region "${{ env.AWS_REGION }}" || true
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region "${{ env.AWS_REGION }}" \
            --query "[Status, StandardOutputContent, StandardErrorContent]" \
            --output text
          echo "::warning::Rolled back to $PREV_SHA — verify the site manually."

  # Free-tier target — deploys from the SAME main commit as the AWS job above,
  # in parallel, scoped to its own environment. Off until vars.FREE_DEPLOY_ENABLED
  # is 'true' (and the free-prod environment + HF_TOKEN exist). The Space builds
  # backend/Dockerfile itself; the Streamlit frontend redeploys from main on its
  # own. The upload is not the deploy: the job then waits out the Space rebuild
  # and requires a healthy /health/warm, so a broken image fails loudly here.
  deploy-free:
    name: Deploy (free-tier)
    runs-on: ubuntu-latest
    needs: ci
    if: >-
      github.ref == 'refs/heads/main'
      && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && vars.FREE_DEPLOY_ENABLED == 'true'
    environment: free-prod
    timeout-minutes: 25

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install the Hugging Face client
        run: pip install "huggingface_hub>=0.25"

      - name: Mirror backend/ to the Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ vars.HF_SPACE || 'Deeason/careerhub' }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_folder(
              repo_id=os.environ["HF_SPACE"],
              repo_type="space",
              folder_path="backend",
              commit_message="Sync backend from GitHub",
              # Mirror: drop anything on the Space that no longer exists here.
              delete_patterns=["*"],
              ignore_patterns=[
                  "**/__pycache__/**",
                  "**/.pytest_cache/**",
                  "**/.ruff_cache/**",
                  "*.pyc",
                  ".env",
              ],
          )
          print(f"Synced backend/ -> {os.environ['HF_SPACE']}")
          PY

      - name: Wait for the Space rebuild and verify health
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ vars.HF_SPACE || 'Deeason/careerhub' }}
          API_BASE: ${{ vars.FREE_API_BASE || 'https://deeason-careerhub.hf.space' }}
        run: |
          python - <<'PY'
          import os
          import sys
          import time

          import requests
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          space = os.environ["HF_SPACE"]
          base = os.environ["API_BASE"]

          # The mirror commit queues a rebuild. A no-op sync (nothing changed)
          # never leaves RUNNING, so plain RUNNING is accepted after a grace
          # period instead of insisting a build was observed.
          fatal = {"BUILD_ERROR", "RUNTIME_ERROR", "CONFIG_ERROR", "NO_APP_FILE", "PAUSED"}
          start = time.time()
          deadline = start + 12 * 60
          seen_building = False
          stage = ""
          while time.time() < deadline:
              stage = str(api.get_space_runtime(space).stage)
              if stage in fatal:
                  sys.exit(f"Space entered {stage}")
              if "BUILDING" in stage:
                  seen_building = True
              elif stage == "RUNNING" and (seen_building or time.time() - start > 180):
                  break
              time.sleep(15)
          else:
              sys.exit(f"Space still {stage} after 12 minutes")
          print(f"Space runtime: RUNNING (rebuild observed: {seen_building})")

          # One warm call proves the app answers and its datastores came back.
          # Free-tier providers drop idle connections, so probe a few times
          # before declaring the deploy bad (same tolerance as keepwarm.yml).
          for attempt in range(1, 4):
              try:
                  body = requests.get(f"{base}/health/warm", timeout=60).json()
              except Exception as exc:  # noqa: BLE001 — any failure just retries
                  body = {"error": str(exc)}
              print(f"attempt {attempt}: {body}")
              db = body.get("db", {}).get("status")
              vector = body.get("vector", {}).get("status")
              redis_state = body.get("redis", {}).get("status")
              if db == "ok" and vector == "ok" and redis_state in ("ok", "disabled"):
                  version = requests.get(base, timeout=30).json().get("version")
                  print(f"Deployed and healthy — version {version}")
                  sys.exit(0)
              time.sleep(30)
          sys.exit("Space is serving but its dependencies stayed unhealthy")
          PY
