name: CI — Lint & Test

on:
  push:
    branches: [main, develop, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main, develop]

jobs:
  backend-ci:
    name: Backend — Python 3.11
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements.dev.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.dev.txt

      - name: Lint with Ruff
        run: ruff check backend/

      - name: Check formatting with Ruff
        run: ruff format --check backend/

      - name: Run Tests
        working-directory: backend
        env:
          POSTGRES_SERVER: localhost
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
          POSTGRES_PORT: 5432
          SECRET_KEY: ci-test-secret-key-at-least-32-characters-long
          TESTING: "true"
          # Optional: set in GitHub Secrets to run live LLM integration tests.
          # Without this, all LLM tests are marked xfail and skipped cleanly.
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: pytest tests/ -v --tb=short
