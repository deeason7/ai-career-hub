name: Deploy

on:
  push:
    branches: [main]

# ── Manual Deployment (current) ────────────────────────────────────────────────
#
# Automated CD is not yet wired up. To deploy a new version:
#
#   1. Build & push images from your local machine:
#        # ECR_REGISTRY = <ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com
#        # Derive it: aws sts get-caller-identity --query Account --output text
#        export ECR_REGISTRY=$(aws sts get-caller-identity --query Account --output text).dkr.ecr.us-east-1.amazonaws.com
#        aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $ECR_REGISTRY
#        docker build -t $ECR_REGISTRY/careerhub-backend:latest ./backend
#        docker build -t $ECR_REGISTRY/careerhub-frontend:latest ./frontend
#        docker push $ECR_REGISTRY/careerhub-backend:latest
#        docker push $ECR_REGISTRY/careerhub-frontend:latest
#
#   2. Connect to EC2 via SSM Session Manager (instance ID derived from tag):
#        INSTANCE_ID=$(aws ec2 describe-instances \
#          --filters "Name=tag:Name,Values=portfolio-server" \
#                    "Name=instance-state-name,Values=running" \
#          --query "Reservations[0].Instances[0].InstanceId" \
#          --output text --region us-east-1)
#        aws ssm start-session --target $INSTANCE_ID --region us-east-1
#
#   3. Run the deploy script (handles secrets, image pull, stack restart):
#        sudo su - ubuntu
#        cd ~/ai-career-hub && git pull origin main && bash infra/scripts/deploy.sh
#
# ── Roadmap: Automated CD ─────────────────────────────────────────────────────
# TODO (v3.0): Replace this with a real GitHub Actions job that:
#   - Builds images with docker/build-push-action
#   - Pushes to ECR using secrets.ECR_REGISTRY
#   - Connects to EC2 via SSM using secrets.EC2_INSTANCE_ID and runs deploy.sh

jobs:
  notify-manual-deploy:
    name: "CD — manual deploy required (see workflow comments)"
    runs-on: ubuntu-latest
    steps:
      - name: Remind about manual deploy process
        run: |
          echo "A push to main was detected."
          echo "Automated CD is not yet configured."
          echo "Follow the steps in .github/workflows/deploy.yml to deploy manually."
