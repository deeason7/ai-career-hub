name: Deploy — Notify Render

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Trigger Render Auto-Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Notify deploy triggered
        run: |
          echo "✅ Push to main detected."
          echo "Render auto-deploys from GitHub — no manual trigger needed."
          echo "Monitor at: https://dashboard.render.com"
