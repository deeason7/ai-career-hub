version: 2
updates:
  # Backend Python dependencies
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    target-branch: develop
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security

  # Frontend Python dependencies
  - package-ecosystem: pip
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    target-branch: develop
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security

  # GitHub Actions — keep action versions current
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    target-branch: develop
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
