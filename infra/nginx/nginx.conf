# nginx.conf — for the Docker nginx container in docker-compose.prod.yml
# Handles TLS termination + reverse proxy to FastAPI (api:8000) and Streamlit (frontend:8501)
#
# Certs:  Issued by certbot on the EC2 host, mounted read-only into the container
#         via: /etc/letsencrypt:/etc/letsencrypt:ro  (see docker-compose.prod.yml)
# Renew:  sudo certbot renew && docker compose -f docker-compose.prod.yml restart nginx

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ── Security defaults ─────────────────────────────────────────────────────
    server_tokens off;

    # ── Gzip compression ──────────────────────────────────────────────────────
    # Reduces Streamlit JS/CSS + FastAPI JSON by ~50-60% on the wire.
    # WebSocket connections are NOT gzipped (handled separately via Upgrade).
    # gzip_min_length 1024: skip tiny responses like /health (no benefit).
    gzip            on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types      text/plain text/css application/json
                    application/javascript text/xml
                    application/xml+rss text/javascript
                    application/wasm;
    gzip_vary       on;   # adds Vary: Accept-Encoding so CDN/proxies cache correctly
    gzip_proxied    any;  # compress proxied responses (FastAPI + Streamlit)

    # ── HTTP → HTTPS redirect + ACME challenge (certbot renewal) ─────────────
    server {
        listen 80;
        server_name careerhub.deeason.com.np _;

        # Allow certbot webroot renewal without HTTPS
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check on HTTP — used by:
        #   - Lambda wake_controller (_check_health via direct EC2 IP, no DNS)
        #   - AWS Route 53 health checker (HTTP on port 80)
        #   - start.sh polling loop
        # Responds directly from FastAPI without 301 redirect — no Route 53
        # delay, no DNS round-trip. Critical for fast wake detection.
        location /health {
            proxy_pass http://api:8000;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS — main app ──────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;                    # http2 on is the non-deprecated form (nginx 1.25.1+)
        server_name careerhub.deeason.com.np _;

        # ── TLS ──────────────────────────────────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/careerhub.deeason.com.np/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/careerhub.deeason.com.np/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security headers ─────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    nosniff                              always;
        add_header X-Frame-Options           DENY                                 always;
        add_header Referrer-Policy           strict-origin-when-cross-origin      always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
        add_header X-XSS-Protection          "1; mode=block"                      always;

        # ── Health check ─────────────────────────────────────────────────────
        location /health {
            proxy_pass http://api:8000;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── FastAPI backend ───────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://api:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 300s;  # 5 min — covers worst-case LLM latency (cover letter gen)
        }

        # ── Streamlit frontend (WebSocket required) ───────────────────────────
        location / {
            proxy_pass         http://frontend:8501;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 86400s;
        }
    }
}
