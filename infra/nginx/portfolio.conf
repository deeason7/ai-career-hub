# Nginx virtual-host config for deeason.com.np
#
# Deployed to: /etc/nginx/sites-available/portfolio on EC2
# Enabled via: ln -s /etc/nginx/sites-available/portfolio /etc/nginx/sites-enabled/
#
# Reload after changes: nginx -t && systemctl reload nginx

# ── AI Career Hub ─────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name careerhub.deeason.com.np;

    # API — FastAPI on :8000
    location /api/ {
        proxy_pass         http://localhost:8000;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;   # cover letter generation can take ~60s
    }

    location /health {
        proxy_pass http://localhost:8000;
    }

    # Frontend — Streamlit on :8501 (WebSocket upgrade required)
    location / {
        proxy_pass         http://localhost:8501;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }
}

# ── Portfolio landing page (static HTML) ──────────────────────────────────────
server {
    listen 80;
    server_name deeason.com.np www.deeason.com.np;
    root  /var/www/portfolio;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

