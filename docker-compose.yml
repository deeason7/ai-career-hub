# LOCAL DEVELOPMENT ONLY — do NOT use in production.
# Production stack: docker-compose.prod.yml (ECR images, awslogs, no ports exposed)
#
# Quick reference:
#   docker compose up -d              Start all services
#   docker compose run --rm test      Run lint + tests
#   docker compose exec api bash      Shell into running API container
#   docker compose logs -f api        Tail API logs
services:
  # ─── PostgreSQL ───────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-careerhub_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-4oJ7TDoGIXsEgC7Pw748gXQT75UU3JBT}
      POSTGRES_DB: ${POSTGRES_DB:-careerhub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-careerhub_admin} -d ${POSTGRES_DB:-careerhub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Require a password so the dev stack mirrors prod; api + test authenticate
    # with the same REDIS_PASSWORD (override via the host env, else the default).
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-localdevredis}"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:-localdevredis}\" --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Ollama (Local LLM) ───────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  # ─── FastAPI Backend ──────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      POSTGRES_SERVER: db
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-localdevredis}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_LLM_MODEL: llama3.2:3b
      CHROMA_PERSIST_DIR: /app/chroma_data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      # Mount migrations too so newly added revisions are visible to
      # `docker compose run api alembic …` without rebuilding the image.
      - ./backend/migrations:/app/migrations
      - chroma_data:/app/chroma_data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Streamlit Frontend ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      API_URL: http://api:8000/api/v1
      # Local-dev hot reload: source is mounted below; Streamlit re-runs on save.
      # poll watcher is required for bind mounts on macOS Docker.
      STREAMLIT_SERVER_RUN_ON_SAVE: "true"
      STREAMLIT_SERVER_FILE_WATCHER_TYPE: poll
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - ./frontend:/app

  # ─── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend

  # ─── Test Runner ──────────────────────────────────────────
  # Usage: docker compose run --rm test
  # Runs ruff lint, ruff format check, then pytest inside the container.
  test:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    profiles: ["test"]
    environment:
      POSTGRES_SERVER: db
      POSTGRES_USER: careerhub_admin
      POSTGRES_PASSWORD: 4oJ7TDoGIXsEgC7Pw748gXQT75UU3JBT
      # Dedicated test database — stops `make test` from wiping the dev `careerhub` DB.
      # conftest creates it automatically on first run (TEST-SHARES-DEV-DB).
      POSTGRES_DB: careerhub_test
      POSTGRES_PORT: "5432"
      SECRET_KEY: test-only-key-not-for-production
      TESTING: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-localdevredis}
      CHROMA_PERSIST_DIR: /tmp/chroma_test
      # Point the Ollama path at a closed port so unmocked LLM calls fail fast
      # instead of doing real CPU inference (TEST-LIVE-OLLAMA) — keeps the suite at
      # ~seconds and matches CI, which has no Ollama service.
      OLLAMA_BASE_URL: http://127.0.0.1:1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        echo '=== Ruff lint ===' &&
        ruff check app/ tests/ &&
        echo '=== Ruff format ===' &&
        ruff format --check app/ tests/ &&
        echo '=== Pytest ===' &&
        pytest tests/ -v --tb=short
      "

volumes:
  postgres_data:
  ollama_data:
  chroma_data:
