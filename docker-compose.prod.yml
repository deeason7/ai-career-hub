
# Production compose for EC2.
#
# Database:  RDS PostgreSQL in private VPC — no db service here.
# Cache:     Redis running locally on EC2 alongside the containers.
# Secrets:   Pulled from SSM Parameter Store into .env.prod at deploy time.
#            Run `bash infra/scripts/pull-secrets.sh` before `docker compose up`.
# TLS:       Let's Encrypt certs on the EC2 host, mounted into the nginx container.
#            Renew with: sudo certbot renew && docker compose -f docker-compose.prod.yml restart nginx
#
# Usage (ECR_REGISTRY is derived at runtime — see infra/scripts/deploy.sh):
#   export ECR_REGISTRY=$(aws sts get-caller-identity --query Account --output text).dkr.ecr.us-east-1.amazonaws.com
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d --remove-orphans
#   docker image prune -f

services:

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s        # was 10s — detect Redis faster
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ───────────────────────────────────────────────────────
  api:
    image: ${ECR_REGISTRY}/careerhub-backend:latest
    restart: unless-stopped
    env_file: .env.prod          # written by infra/scripts/pull-secrets.sh
    environment:
      REDIS_HOST: redis          # Docker network — not sensitive, no SSM needed
    expose:
      - "8000"                   # internal only — nginx proxies externally
    depends_on:
      redis:
        condition: service_healthy
    # Fast health check — nginx waits for THIS before starting (service_healthy below).
    # Uses Python urllib because curl is not installed in python:3.11-slim.
    # start_period covers: alembic upgrade head (~5-10s) + uvicorn startup (~5s) = safe at 25s.
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\", timeout=5)' || exit 1"]
      interval: 5s       # check every 5s (default was 30s)
      timeout: 6s
      retries: 3
      start_period: 25s  # grace period before health checks start
    logging:
      driver: awslogs
      options:
        awslogs-group: /portfolio/careerhub-backend
        awslogs-region: us-east-1
        awslogs-stream: api

  # ─── Streamlit Frontend ────────────────────────────────────────────────────
  frontend:
    image: ${ECR_REGISTRY}/careerhub-frontend:latest
    restart: unless-stopped
    environment:
      API_URL: https://careerhub.deeason.com.np/api/v1
    expose:
      - "8501"                   # internal only — nginx proxies externally
    depends_on:
      api:
        condition: service_healthy  # don't start Streamlit until FastAPI is ready
    # Override the Dockerfile HEALTHCHECK with faster intervals.
    # Streamlit built-in health endpoint: /_stcore/health (returns 200 when ready).
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8501/_stcore/health\", timeout=5)' || exit 1"]
      interval: 8s       # check every 8s
      timeout: 6s
      retries: 3
      start_period: 35s  # Streamlit takes 20-30s to fully initialise
    logging:
      driver: awslogs
      options:
        awslogs-group: /portfolio/careerhub-frontend
        awslogs-region: us-east-1
        awslogs-stream: frontend

  # ─── Nginx (TLS termination + reverse proxy) ──────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Let's Encrypt certs issued on the EC2 host (sudo certbot certonly --dns-route53)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # ACME challenge dir for automated renewal
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy  # nginx starts only AFTER FastAPI is truly ready
      frontend:
        condition: service_started  # Streamlit can warm up behind nginx (doesn't block /health)
    logging:
      driver: awslogs
      options:
        awslogs-group: /portfolio/careerhub-nginx
        awslogs-region: us-east-1
        awslogs-stream: nginx
